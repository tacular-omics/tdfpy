name: Upload Python Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build wheels - ${{ matrix.os }} py${{ matrix.python-version }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            python-version: "3.12"
          - os: ubuntu-latest
            target: x86_64
            python-version: "3.13"
          - os: ubuntu-latest
            target: x86_64
            python-version: "3.14"
          - os: windows-latest
            target: x64
            python-version: "3.12"
          - os: windows-latest
            target: x64
            python-version: "3.13"
          - os: windows-latest
            target: x64
            python-version: "3.14"
          - os: macos-latest
            target: aarch64
            python-version: "3.12"
          - os: macos-latest
            target: aarch64
            python-version: "3.13"
          - os: macos-latest
            target: aarch64
            python-version: "3.14"

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Build wheels
      uses: PyO3/maturin-action@v1
      with:
        target: ${{ matrix.target }}
        args: --release --out dist -i python${{ matrix.python-version }}
        sccache: 'true'
        manylinux: auto

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}-${{ matrix.target }}-py${{ matrix.python-version }}
        path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build sdist
      uses: PyO3/maturin-action@v1
      with:
        command: sdist
        args: --out dist
    - name: Upload sdist
      uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist/*.tar.gz

  publish:
    needs: [build, sdist]
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        path: dist
        merge-multiple: true

    - name: Download sdist
      uses: actions/download-artifact@v4
      with:
        name: sdist
        path: dist

    - name: Publish package
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        user: __token__
        password: ${{ secrets.PYPI_API_TOKEN }}
