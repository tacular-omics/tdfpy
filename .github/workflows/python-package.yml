name: Python package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:

    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Install dependencies
      run: just install-dev

    - name: Build wheel and verify native libraries
      run: |
        pip install build
        python -m build --wheel --outdir /tmp/verify-dist
        python -c "
        import zipfile, sys, pathlib
        wheels = list(pathlib.Path('/tmp/verify-dist').glob('*.whl'))
        assert wheels, 'No wheel found'
        with zipfile.ZipFile(wheels[0]) as zf:
            names = zf.namelist()
        missing = [f for f in ('libtimsdata.so', 'timsdata.dll') if not any(f in n for n in names)]
        if missing:
            print('FAIL: missing from wheel:', missing)
            print('Wheel contents:', names)
            sys.exit(1)
        print('OK: wheel contains libtimsdata.so and timsdata.dll')
        "

    - name: Lint with ruff
      run: just lint

    - name: Type check with ty
      run: just ty

    - name: Test with pytest coverage
      run: just test-cov

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: tacular-omics/tdfpy
        files: coverage.xml
        fail_ci_if_error: false

    - name: Generate JUnit test results
      if: ${{ !cancelled() }}
      run: uv run pytest tests --junitxml=junit.xml -o junit_family=legacy

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: tacular-omics/tdfpy
        report_type: test_results
        files: junit.xml
        fail_ci_if_error: false
